<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="에듀테크 정책, 연구, 산업 뉴스를 기획 관점으로 모아보는 리서치 인박스">
  <title>EduTech Letter | 기획 리서치 인박스</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/" aria-label="EduTech Letter 홈">
      <span class="brand-mark" aria-hidden="true">E</span>
      <span>
        <strong>EduTech Letter</strong>
        <small>기획 리서치 인박스</small>
      </span>
    </a>
    <button class="refresh-button" id="refresh-button" type="button">
      <span aria-hidden="true">↻</span> 새 자료 불러오기
    </button>
  </header>

  <main class="app">
    <section class="hero">
      <div>
        <p class="eyebrow">오늘의 에듀테크 리서치</p>
        <h1>뉴스보다 한 걸음 더,<br><span>기획에 쓸 근거를 모아요.</span></h1>
        <p class="hero-copy">정책·연구·투자·교육 현장 자료를 한곳에서 빠르게 살펴보세요.</p>
        <div class="briefing-date">
          <span>최근 14일 브리핑</span>
          <p class="date" id="current-date"></p>
        </div>
      </div>
      <div class="hero-icon" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
    </section>

    <section class="summary" aria-label="수집 현황">
      <article><span class="summary-icon blue">⌁</span><div><strong id="total-count">-</strong><p>수집 자료</p></div></article>
      <article><span class="summary-icon orange">◎</span><div><strong id="source-count">-</strong><p>발행기관</p></div></article>
      <article class="source-summary"><div><p>지정 발행기관</p><div class="source-list" id="source-list"></div></div></article>
    </section>

    <section class="content-header">
      <div>
        <p class="eyebrow">Research inbox</p>
        <h2>기획 리서치 자료</h2>
      </div>
      <label class="search-box">
        <span aria-hidden="true">⌕</span>
        <input id="search-input" type="search" placeholder="자료명, 발행기관, 키워드 검색">
      </label>
    </section>

    <nav class="filters" id="filters" aria-label="자료 유형"></nav>

    <section class="status" id="loading-state">
      <div class="spinner"></div>
      <p>지정 사이트의 최신 자료를 모으고 있습니다.</p>
    </section>
    <section class="research-list" id="research-list" hidden></section>
    <section class="status" id="empty-state" hidden><p>조건에 맞는 자료가 없습니다.</p></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
